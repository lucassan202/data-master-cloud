name: 'Databricks Terraform CI/CD'

on:
#  workflow_call:
#    inputs:
#      environment:
#        type: string
#        required: true
#      aws-assume-role-arn:
#        type: string
#        required: true
#      aws-region:
#        type: string
#        required: true
#      aws-statefile-s3-bucket:
#        type: string
#        required: true
#      aws-lock-dynamodb-table:
#        type: string
#        required: true
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read     

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: dev 
    env:      
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}  

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::120945137272:role/github-actions-data-master
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: us-east-2

      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r '.dev' ./IaC/destroy_config.json)"
          echo "destroy=$(echo $DESTROY)" >> $GITHUB_OUTPUT          

      - name: Terraform Init
        run: |
          cd IaC && terraform init \
            -backend-config="bucket=besga" \
            -backend-config="key=${{ github.event.repository.name }}" \
            -backend-config="region=us-east-2" \
            -backend-config="dynamodb_table=data-master-us-east-2-terraform-lock"
      
      - name: Terraform Validate
        run: terraform validate

        # If using a remote backend, ensure credentials are provided via environment variables or configuration

      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: cd infra &&
          terraform workspace dev || terraform workspace new dev &&
          terraform destroy -var-file="./IaC/jobs.auto.tfvars" -var-file="./IaC/notebook.auto.tfvars" -auto-approve
      
      - name: Terraform Plan
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-plan
        run: cd IaC && 
          terraform workspace select dev || terraform workspace new dev &&
          terraform plan -out="dev.plan"

      - name: Terraform Apply
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-apply      
        run: cd IaC &&
          terraform workspace select dev || terraform workspace new dev &&
          terraform apply "dev.plan"